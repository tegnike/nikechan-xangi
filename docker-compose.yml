# 共通設定
x-common: &common
  restart: unless-stopped
  env_file:
    - ../.env.xangi
  volumes:
    # Claude Code CLI 認証情報（コンテナ専用ボリューム）
    - claude-data:/home/node/.claude
    # Codex CLI 認証情報（コンテナ専用ボリューム）
    - codex-data:/home/node/.codex
    # ワークスペース（nikechanリポジトリ全体）
    - ${WORKSPACE_PATH:-..}:/workspace
    # ローカル専用スキル（l-*）を空ボリュームで隠す
    - /workspace/.claude/skills/l-crypto-check
    - /workspace/.claude/skills/l-license-checker
    - /workspace/.claude/skills/l-local-scan
    - /workspace/.claude/skills/l-marp-slides
    - /workspace/.claude/skills/l-openclaw
    - /workspace/.claude/skills/l-tech-news-curation
    - /workspace/.claude/skills/l-workspace-rag
    - /workspace/.claude/skills/l-xangi-restart
    - /workspace/.claude/skills/l-xangi-settings
    # opencode 設定（Alibaba/Qwen プロバイダー定義）
    - ${WORKSPACE_PATH:-..}/opencode.json:/workspace/opencode.json:ro
    # Git設定
    - ~/.gitconfig:/home/node/.gitconfig:ro
  environment: &common-env
    # GitHub CLI (GH_TOKEN環境変数で認証)
    - GH_TOKEN=${GH_TOKEN:-}
    - NODE_ENV=production
    # コンテナ内のワークスペースパス
    - WORKSPACE_PATH=/workspace
    - SKIP_PERMISSIONS=${SKIP_PERMISSIONS:-false}
    # Agent
    - AGENT_BACKEND=${AGENT_BACKEND:-claude-code}
    - AGENT_MODEL=${AGENT_MODEL:-}
    # Alibaba/Qwen (opencode バックエンド用)
    - ALIBABA_API_KEY=${ALIBABA_API_KEY:-}
    # Scheduler data directory (for schedules.json)
    - DATA_DIR=/workspace/.xangi

services:
  # ミニマム版（デフォルト）
  xangi:
    <<: *common
    build: .
    container_name: xangi

  # フル版（uv + Python）
  xangi-max:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile.max
    container_name: xangi-max
    ports:
      - "8080:8080"

volumes:
  claude-data:
    name: xangi_claude-data
  codex-data:
    name: xangi_codex-data
