# 共通設定
x-common: &common
  restart: unless-stopped
  env_file:
    - ../.env.xangi
  volumes:
    # Claude Code CLI 認証情報（コンテナ専用ボリューム）
    - claude-data:/home/node/.claude
    # Codex CLI 認証情報（コンテナ専用ボリューム）
    - codex-data:/home/node/.codex
    # ワークスペース（nikechanリポジトリ全体）
    - ${WORKSPACE_PATH:-..}:/workspace
    # ローカル専用スキル（l-*）を空ボリュームで隠す
    - /workspace/.claude/skills/l-crypto-check
    - /workspace/.claude/skills/l-license-checker
    - /workspace/.claude/skills/l-local-scan
    - /workspace/.claude/skills/l-marp-slides
    - /workspace/.claude/skills/l-openclaw
    - /workspace/.claude/skills/l-tech-news-curation
    - /workspace/.claude/skills/l-workspace-rag
    - /workspace/.claude/skills/l-xangi-restart
    - /workspace/.claude/skills/l-xangi-settings
    # opencode 設定（互換用。通常のLLM実行はCodexを使う）
    - ${WORKSPACE_PATH:-..}/opencode.json:/workspace/opencode.json:ro
    # Git設定
    - ~/.gitconfig:/home/node/.gitconfig:ro
  environment: &common-env
    # GitHub CLI (GH_TOKEN環境変数で認証)
    - GH_TOKEN=${GH_TOKEN:-}
    - NODE_ENV=production
    # コンテナ内のワークスペースパス
    - WORKSPACE_PATH=/workspace
    - SKIP_PERMISSIONS=${SKIP_PERMISSIONS:-false}
    # Agent
    - AGENT_BACKEND=${AGENT_BACKEND:-codex}
    - AGENT_MODEL=${AGENT_MODEL:-gpt-5.5}
    # nikechan-x-worker integration
    - NIKECHAN_X_WORKER_SELF_TWEET_ENABLED=${NIKECHAN_X_WORKER_SELF_TWEET_ENABLED:-true}
    - NIKECHAN_X_WORKER_URL=${NIKECHAN_X_WORKER_URL:-http://nikechan-x-worker:8787}
    - NIKECHAN_X_WORKER_SELF_TWEET_MAX_ACTIONS=${NIKECHAN_X_WORKER_SELF_TWEET_MAX_ACTIONS:-3}
    # Disable legacy external provider passthrough even when .env.xangi still contains old keys.
    - CROF_API_KEY=
    - CROF_BASE_URL=
    - CROF_MODEL=
    - ANTHROPIC_BASE_URL=
    - ANTHROPIC_AUTH_TOKEN=
    # Scheduler data directory (for schedules.json)
    - DATA_DIR=/workspace/.xangi

services:
  # ミニマム版（デフォルト）
  xangi:
    <<: *common
    build: .
    container_name: xangi

  # フル版（uv + Python）
  xangi-max:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile.max
    container_name: xangi-max
    ports:
      - "8080:8080"

  # X専用Hermes worker
  nikechan-x-worker:
    restart: unless-stopped
    build:
      context: ${NIKECHAN_X_WORKER_PATH:-../nikechan-x-worker}
    container_name: nikechan-x-worker
    env_file:
      - ../.env.xangi
    working_dir: /worker
    volumes:
      - ${NIKECHAN_X_WORKER_PATH:-../nikechan-x-worker}:/worker
      - ${WORKSPACE_PATH:-..}:/workspace:ro
      - hermes-data:/home/node/.hermes
      - codex-data:/home/node/.codex
      - ~/.gitconfig:/home/node/.gitconfig:ro
    environment:
      - NODE_ENV=production
      - NIKECHAN_CORE_SNAPSHOT_DIR=/workspace/.nikechan-core
      - NIKECHAN_OPS_REPO_PATH=/workspace
      - NIKECHAN_X_WORKER_CANONICAL_MEMORY=${NIKECHAN_X_WORKER_CANONICAL_MEMORY:-auto}
      - NIKECHAN_X_WORKER_HERMES_MODE=${NIKECHAN_X_WORKER_HERMES_MODE:-cli}
      - NIKECHAN_X_WORKER_HERMES_COMMAND=${NIKECHAN_X_WORKER_HERMES_COMMAND:-hermes}
      - NIKECHAN_X_WORKER_HERMES_PROVIDER=${NIKECHAN_X_WORKER_HERMES_PROVIDER:-openai-codex}
      - NIKECHAN_X_WORKER_HERMES_MODEL=${NIKECHAN_X_WORKER_HERMES_MODEL:-gpt-5.3-codex-spark}
      - NIKECHAN_X_WORKER_HERMES_BASE_URL=${NIKECHAN_X_WORKER_HERMES_BASE_URL:-}
      - CROF_API_KEY=
      - CODEX_HOME=/home/node/.codex
      - NIKECHAN_X_WORKER_HERMES_SKILLS=${NIKECHAN_X_WORKER_HERMES_SKILLS:-nikechan-x-self-tweet,nikechan-x-trend-context}
      - NIKECHAN_X_WORKER_HERMES_TOOLSETS=${NIKECHAN_X_WORKER_HERMES_TOOLSETS:-nikechan-x-worker,skills,memory,x_search}
      - NIKECHAN_X_WORKER_HERMES_TIMEOUT_MS=${NIKECHAN_X_WORKER_HERMES_TIMEOUT_MS:-240000}
      - NIKECHAN_X_WORKER_HERMES_SKILL_AUTOCOMMIT=${NIKECHAN_X_WORKER_HERMES_SKILL_AUTOCOMMIT:-true}
      - NIKECHAN_X_WORKER_REPO_PATH=/worker
      - NIKECHAN_X_WORKER_HERMES_SKILL_SNAPSHOT_PATH=skills/hermes/nikechan-x-self-tweet/SKILL.md
      - NIKECHAN_X_WORKER_MEMORY_PATH=.worker/hermes-memory.json
      - NIKECHAN_X_WORKER_AUDIT_DIR=.worker/audit
      - NIKECHAN_X_WORKER_KILL_SWITCH=${NIKECHAN_X_WORKER_KILL_SWITCH:-open}
      - NIKECHAN_X_WORKER_X_KILL_SWITCH=${NIKECHAN_X_WORKER_X_KILL_SWITCH:-open}
      - NIKECHAN_X_WORKER_PORT=8787
    command: ["node", "dist/cli.js", "serve", "--host", "0.0.0.0", "--port", "8787"]

volumes:
  claude-data:
    name: xangi_claude-data
  codex-data:
    name: xangi_codex-data
  hermes-data:
    name: nikechan_x_worker_hermes-data
